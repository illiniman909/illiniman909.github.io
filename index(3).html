<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krusty Kardboard TCG</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 60px;
      font-family: 'Nunito', sans-serif;
      position: relative;
      overflow-x: hidden;

      background-image: url('cardboard.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* Subtle dark overlay for readability */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: rgba(80, 45, 5, 0.18);
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .logo {
      width: 90%;
      max-width: 380px;
      filter: drop-shadow(0 6px 20px rgba(0,0,0,0.5));
      animation: popIn 0.5s cubic-bezier(0.22, 1.6, 0.36, 1) both;
    }

    .divider {
      width: 80%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #5c3610, #2a1200, #5c3610, transparent);
      border-radius: 2px;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #fff;
      border: none;
      box-shadow: 0 4px 0 rgba(0,0,0,0.28), 0 8px 24px rgba(0,0,0,0.2);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      animation: fadeUp 0.4s ease both;
    }
    .link-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 0 rgba(0,0,0,0.28), 0 14px 28px rgba(0,0,0,0.22);
    }
    .link-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.28);
    }

    .btn-logo {
      width: 30px;
      height: 30px;
      object-fit: contain;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
    }

    .btn-venmo   { background: linear-gradient(135deg, #008cff 0%, #0070d0 100%); animation-delay: 0.35s; }
    .btn-cashapp { background: linear-gradient(135deg, #00c244 0%, #009e36 100%); animation-delay: 0.45s; }
    .btn-paypal  { background: linear-gradient(135deg, #003087 0%, #0070ba 100%); animation-delay: 0.55s; }

    .tagline {
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: rgba(42,26,0,0.6);
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fadeUp 0.4s 0.7s ease both;
    }

    @keyframes popIn {
      from { transform: scale(0.75) rotate(-2deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);     opacity: 1; }
    }
    @keyframes fadeUp {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">

    <img class="logo" src="logo.png" alt="Krusty Kardboard TCG" />

    <div class="divider"></div>

    <div class="links">

      <a class="link-btn btn-venmo"
         href="venmo://paycharge?txn=pay&recipients=Charles-Roberts-9"
         onclick="if(!navigator.userAgent.match(/iPhone|Android/i)) this.href='https://venmo.com/u/Charles-Roberts-9'"
         target="_blank" rel="noopener">
        <img class="btn-logo" src="https://cdn.simpleicons.org/venmo/white" alt="Venmo" />
        Pay with Venmo
      </a>

      <a class="link-btn btn-cashapp"
         href="cashme://cash.app/oWildGinger"
         onclick="if(!navigator.userAgent.match(/iPhone|Android/i)) this.href='https://cash.app/$oWildGinger'"
         target="_blank" rel="noopener">
        <img class="btn-logo" src="https://cdn.simpleicons.org/cashapp/white" alt="Cash App" />
        Pay with Cash App
      </a>

      <a class="link-btn btn-paypal"
         href="https://paypal.me/krustykardboard"
         target="_blank" rel="noopener">
        <img class="btn-logo" src="https://cdn.simpleicons.org/paypal/white" alt="PayPal" />
        Pay with PayPal
      </a>

    </div>

    <div class="divider"></div>
    <p class="tagline">Singles &bull; Slabs &bull; Sealed</p>

  </div>
</body>
</html>
